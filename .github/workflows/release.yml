name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile --prefer-offline

      - name: Lint + Format + Build + Test
        run: |
          pnpm run lint &
          PID_LINT=$!
          pnpm run format:check &
          PID_FMT=$!
          pnpm run build &
          PID_BUILD=$!
          wait $PID_LINT $PID_FMT $PID_BUILD
          pnpm test

  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: ci
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile --prefer-offline
      - run: pnpm run build

      - name: Semantic Release
        run: pnpm exec semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
